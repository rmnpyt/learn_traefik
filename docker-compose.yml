services:
  traefik-learn:
    image: traefik-interactive-guide-traefik-learn
    build:
      context: .
      dockerfile: Dockerfile
    container_name: traefik-learn
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.traefik-learn.rule=Host(`${TRAEFIK_LEARN_DOMAIN}`)
      - traefik.http.routers.traefik-learn.entrypoints=websecure
      - traefik.http.routers.traefik-learn.tls.certresolver=letsencrypt
      - traefik.http.services.traefik-learn.loadbalancer.server.port=3000

networks:
  proxy:
    name: proxy
    external: true
