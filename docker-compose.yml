services:
  traefik-learn:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: traefik-learn
    restart: unless-stopped
    ports:
      - "3089:3000"
    environment:
      - NODE_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - traefik-learn-net

networks:
  traefik-learn-net:
    driver: bridge
